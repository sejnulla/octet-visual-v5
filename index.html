<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Non-grid Pixelation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8e8e8;display:flex;height:100vh;overflow:hidden;font-size:12px}

#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
#canvas-wrapper{position:relative;box-shadow:0 4px 32px rgba(0,0,0,.2)}
#output-canvas{display:block}
.text-ov{position:absolute;cursor:move;user-select:none;white-space:nowrap;line-height:1.1}
.text-ov.sel{outline:2px dashed rgba(255,255,255,.7)}

#btm{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#fff;border-radius:8px;padding:5px 12px;display:flex;gap:6px;align-items:center;font-size:12px;color:#333;box-shadow:0 2px 8px rgba(0,0,0,.12)}
#btm input[type=number]{width:52px;border:none;font-size:12px;text-align:right;outline:none}
#btm span{color:#999}
#btm select{font-size:11px;border:1px solid #ccc;border-radius:4px;padding:2px 5px}

/* Panel */
#panel{width:258px;background:#f4f4f4;border-left:1px solid #ddd;overflow-y:auto;flex-shrink:0;padding-bottom:40px}
#pt{padding:10px 14px 8px;font-size:13px;font-weight:700;color:#111;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
#pt button{font-size:10px;background:none;border:1px solid #bbb;border-radius:4px;padding:2px 8px;cursor:pointer;color:#555}

.sec{border-bottom:1px solid #e0e0e0}
.sh{padding:8px 14px;font-size:11.5px;font-weight:600;color:#222;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#f4f4f4;user-select:none}
.sh:hover{background:#eee}
.sh .ar{font-size:9px;opacity:.55;transition:transform .15s}
.sh.op .ar{transform:rotate(180deg)}
.sb{padding:10px 14px;background:#fff;display:none}
.sb.op{display:block}

.field{margin-bottom:8px}
.lbl{display:block;font-size:10.5px;color:#666;margin-bottom:3px;font-weight:500}
.row{display:flex;align-items:center;gap:5px}
input[type=range]{flex:1;height:16px;accent-color:#222;cursor:pointer;min-width:0}
input[type=number]{width:44px;border:1px solid #ccc;border-radius:4px;padding:2px 4px;font-size:11px;text-align:right}
input[type=color]{width:24px;height:20px;border:1px solid #ccc;border-radius:3px;padding:1px;cursor:pointer;flex-shrink:0}
input[type=text]{width:100%;border:1px solid #ccc;border-radius:4px;padding:4px 7px;font-size:11px}
select{width:100%;border:1px solid #ccc;border-radius:4px;padding:3px 5px;font-size:11px;background:#fff}

.swatch{height:18px;border-radius:4px;margin:4px 0;border:1px solid rgba(0,0,0,.08)}

.tabs{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:9px}
.tab{flex:1;padding:5px;text-align:center;font-size:11px;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.tab.on{color:#111;border-bottom-color:#111;font-weight:600}

.drop{border:2px dashed #ccc;border-radius:5px;padding:9px;text-align:center;font-size:11px;color:#888;cursor:pointer;transition:border-color .15s}
.drop:hover{border-color:#888}
.thumb{width:100%;border-radius:3px;margin-top:5px;display:none}
video#vp{width:100%;border-radius:3px;margin-top:5px;display:none;max-height:110px;object-fit:contain;background:#111}

.tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.tog{position:relative;width:30px;height:16px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.ts{position:absolute;inset:0;background:#ccc;border-radius:8px;cursor:pointer;transition:background .15s}
.ts:before{content:'';position:absolute;width:12px;height:12px;left:2px;top:2px;background:#fff;border-radius:50%;transition:transform .15s}
.tog input:checked+.ts{background:#222}
.tog input:checked+.ts:before{transform:translateX(14px)}

.chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.chip{padding:2px 7px;border-radius:9px;border:1px solid #ccc;font-size:10px;cursor:pointer;background:#fff;color:#555;transition:all .1s}
.chip.on{background:#111;color:#fff;border-color:#111}

.btn{display:block;width:100%;padding:6px;font-size:11px;border-radius:5px;border:1px solid #ccc;background:#f0f0f0;cursor:pointer;text-align:center;margin-bottom:5px}
.btn:hover{background:#e5e5e5}
.btn.pri{background:#111;color:#fff;border-color:#111;font-size:12px;padding:8px}
.btn.pri:hover{background:#333}
.btn.del{border-color:#d33;color:#d33}
.btn.del:hover{background:#fff5f5}
.btn.sm{font-size:10px;padding:4px 8px;width:auto;display:inline-block;margin:0}

.ti{padding:4px 8px;border:1px solid #ddd;border-radius:4px;margin-bottom:4px;cursor:pointer;background:#fafafa;font-size:11px}
.ti.on{border-color:#111;background:#f0f0f0}

/* Presets */
.preset-row{display:flex;gap:4px;margin-bottom:6px}
.preset-row select{flex:1}

.live-dot{display:inline-block;width:6px;height:6px;background:#e55;border-radius:50%;margin-right:4px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

hr.div{border:none;border-top:1px solid #e8e8e8;margin:6px 0}
.sh-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sh.off{opacity:0.42}
</style>
</head>
<body>

<div id="canvas-area">
  <div id="canvas-wrapper">
    <canvas id="output-canvas"></canvas>
  </div>
  <div id="btm">
    <span>W</span><input type="number" id="cw" value="800" min="100" max="4000" step="50">
    <span>px H</span><input type="number" id="ch" value="1100" min="100" max="4000" step="50">
    <span>px</span>
    <select id="preset-size">
      <option value="">Custom</option>
      <option value="800x1100">A4</option>
      <option value="1080x1080">Square</option>
      <option value="1080x1920">Story</option>
      <option value="2500x3500">Print</option>
    </select>
  </div>
</div>

<div id="panel">
  <div id="pt">Non-grid Pixelation <button onclick="resetAll()">Reset</button></div>

  <!-- Input -->
  <div class="sec">
    <div class="sh op" onclick="tog(this)">Input <span class="ar">▲</span></div>
    <div class="sb op">
      <div class="tabs">
        <div class="tab on" id="ti" onclick="switchInput('img')">Image</div>
        <div class="tab" id="tv" onclick="switchInput('vid')">Video</div>
      </div>
      <div id="ii">
        <div class="drop" onclick="document.getElementById('if').click()">Click or drop image</div>
        <input type="file" id="if" accept="image/*" style="display:none" onchange="loadImg(event)">
        <img id="ith" class="thumb">
        <button class="btn" style="margin-top:6px" onclick="loadExampleImg()">🌸 Load example image</button>
      </div>
      <div id="iv" style="display:none">
        <div class="drop" onclick="document.getElementById('vf').click()">Click or drop video</div>
        <input type="file" id="vf" accept="video/*" style="display:none" onchange="loadVid(event)">
        <video id="vp" controls></video>
        <button class="btn" style="margin-top:6px" onclick="loadExampleVid()">▶ Load example video</button>
        <div class="tog-row" style="margin-top:7px">
          <span style="font-size:11px"><span class="live-dot"></span>Live (while playing)</span>
          <label class="tog"><input type="checkbox" id="live" onchange="onLiveToggle()"><span class="ts"></span></label>
        </div>
        <button class="btn" style="margin-top:2px" onclick="processFrame()">Process current frame</button>
      </div>
    </div>
  </div>

  <!-- Thresholds -->
  <div class="sec">
    <div class="sh op" onclick="tog(this)">Thresholds <span class="ar">▲</span></div>
    <div class="sb op">
      <div class="field"><label class="lbl">Dark</label>
        <div class="row"><input type="range" id="td" min="0" max="255" value="25" oninput="sn(this,'ntd');render()"><input type="number" id="ntd" value="25" min="0" max="255" oninput="sr(this,'td');render()"></div></div>
      <div class="field"><label class="lbl">Shadow</label>
        <div class="row"><input type="range" id="ts" min="0" max="255" value="50" oninput="sn(this,'nts');render()"><input type="number" id="nts" value="50" min="0" max="255" oninput="sr(this,'ts');render()"></div></div>
      <div class="field"><label class="lbl">Midtone</label>
        <div class="row"><input type="range" id="tm" min="0" max="255" value="130" oninput="sn(this,'ntm');render()"><input type="number" id="ntm" value="130" min="0" max="255" oninput="sr(this,'tm');render()"></div></div>
      <div class="field"><label class="lbl">Highlight</label>
        <div class="row"><input type="range" id="th" min="0" max="255" value="200" oninput="sn(this,'nth');render()"><input type="number" id="nth" value="200" min="0" max="255" oninput="sr(this,'th');render()"></div></div>
      <div class="field"><label class="lbl">Reference overlay opacity</label>
        <div class="row"><input type="range" id="ref" min="0" max="100" value="0" oninput="sn(this,'nref');render()"><input type="number" id="nref" value="0" min="0" max="100" oninput="sr(this,'ref');render()"></div></div>
    </div>
  </div>

  <!-- Layer sections (built by JS) -->
  <div class="sec"><div class="sh" onclick="tog(this)">Darks Layer<span class="sh-right"><label class="tog" onclick="event.stopPropagation()"><input type="checkbox" id="den" checked onchange="onLayerToggle(this,'d')"><span class="ts"></span></label><span class="ar">▼</span></span></div><div class="sb" id="bd"></div></div>
  <div class="sec"><div class="sh op" onclick="tog(this)">Shadows Layer<span class="sh-right"><label class="tog" onclick="event.stopPropagation()"><input type="checkbox" id="sen" checked onchange="onLayerToggle(this,'s')"><span class="ts"></span></label><span class="ar">▲</span></span></div><div class="sb op" id="bs"></div></div>
  <div class="sec"><div class="sh" onclick="tog(this)">Midtones Layer<span class="sh-right"><label class="tog" onclick="event.stopPropagation()"><input type="checkbox" id="men" checked onchange="onLayerToggle(this,'m')"><span class="ts"></span></label><span class="ar">▼</span></span></div><div class="sb" id="bm"></div></div>
  <div class="sec"><div class="sh" onclick="tog(this)">Highlights Layer<span class="sh-right"><label class="tog" onclick="event.stopPropagation()"><input type="checkbox" id="hen" checked onchange="onLayerToggle(this,'h')"><span class="ts"></span></label><span class="ar">▼</span></span></div><div class="sb" id="bh"></div></div>
  <div class="sec"><div class="sh" onclick="tog(this)">Brights Layer<span class="sh-right"><label class="tog" onclick="event.stopPropagation()"><input type="checkbox" id="ben" checked onchange="onLayerToggle(this,'b')"><span class="ts"></span></label><span class="ar">▼</span></span></div><div class="sb" id="bb"></div></div>

  <!-- Background -->
  <div class="sec">
    <div class="sh" onclick="tog(this)">Background <span class="ar">▼</span></div>
    <div class="sb">
      <div class="field"><label class="lbl">Color</label><input type="color" id="bgc" value="#000000" oninput="render()"></div>
    </div>
  </div>

  <!-- Presets -->
  <div class="sec">
    <div class="sh" onclick="tog(this)">Presets <span class="ar">▼</span></div>
    <div class="sb">
      <div class="preset-row">
        <select id="preset-sel"><option value="">— select preset —</option></select>
        <button class="btn sm" onclick="loadPreset()">Load</button>
        <button class="btn sm del" onclick="deletePreset()">✕</button>
      </div>
      <button class="btn" onclick="showSaveForm()">Save current as preset…</button>
      <div id="save-form" style="display:none;margin-top:5px">
        <div class="row">
          <input type="text" id="preset-name" placeholder="Preset name…" style="flex:1;border:1px solid #ccc;border-radius:4px;padding:4px 7px;font-size:11px">
          <button class="btn sm pri" style="margin-left:4px" onclick="confirmSave()">Save</button>
          <button class="btn sm" onclick="hideSaveForm()">✕</button>
        </div>
      </div>
      <div id="preset-info" style="font-size:10px;color:#888;margin-top:4px"></div>
    </div>
  </div>

  <!-- Text overlay -->
  <div class="sec">
    <div class="sh" onclick="tog(this)">Text Overlay <span class="ar">▼</span></div>
    <div class="sb">
      <div class="tog-row"><span>Show text</span><label class="tog"><input type="checkbox" id="sht" checked onchange="renderText()"><span class="ts"></span></label></div>
      <button class="btn" onclick="addTxt()">Add text layer</button>
      <button class="btn del" onclick="delTxt()">Delete selected</button>
      <div id="txtlist"></div>
      <div id="txtctrl" style="display:none;margin-top:7px">
        <div class="field"><label class="lbl">Content</label><input type="text" id="tc" oninput="updTxt()"></div>
        <div class="field"><label class="lbl">Size</label><div class="row"><input type="range" id="tfs" min="8" max="400" value="80" oninput="sn(this,'ntfs');updTxt()"><input type="number" id="ntfs" value="80" oninput="sr(this,'tfs');updTxt()"></div></div>
        <div class="field"><label class="lbl">Weight</label><select id="tw" onchange="updTxt()"><option value="400">Regular</option><option value="700" selected>Bold</option><option value="900">Black</option></select></div>
        <div class="field"><label class="lbl">Style</label><select id="tst" onchange="updTxt()"><option value="normal" selected>Normal</option><option value="italic">Italic</option></select></div>
        <div class="field"><label class="lbl">Color</label><input type="color" id="tco" value="#ffffff" oninput="updTxt()"></div>
        <div class="field"><label class="lbl">Background + opacity %</label><div class="row"><input type="color" id="tbg" value="#000000" oninput="updTxt()"><input type="number" id="tbgo" min="0" max="100" value="0" oninput="updTxt()"><span>%</span></div></div>
        <div class="field"><label class="lbl">Custom font</label><input type="file" accept=".ttf,.otf,.woff,.woff2" onchange="loadFont(event)" style="font-size:10px;width:100%"></div>
      </div>
    </div>
  </div>

  <div style="padding:12px 14px">
    <button class="btn pri" onclick="exportPNG()">⬆ Export PNG</button>
    <button class="btn" onclick="regenerate()">Regenerate scatter</button>
  </div>
</div>

<script>
// ══ Default preset (botanical) ════════════════════════════════════════════════
const DEFAULT_PRESET = {
  td:'18', ts:'55', tm:'130', th:'210', ref:'0', bgc:'#000000',
  layers:[
    {id:'d',theme:'bloom',  c1:'#e18ea3',c2:'#cf2f1e',mode:'solid-brightness',ps:'16',dn:'80',jt:'18',sw:'0',sc:'#000000',sg:false,en:false},
    {id:'s',theme:'forest', c1:'#a0b80a',c2:'#4e5d02',mode:'solid-brightness',ps:'16',dn:'80',jt:'18',sw:'0',sc:'#000000',sg:false,en:true},
    {id:'m',theme:'surface',c1:'#645139',c2:'#5ca6cd',mode:'gradient-cell',   ps:'24',dn:'88',jt:'20',sw:'0',sc:'#000000',sg:false,en:true},
    {id:'h',theme:'bloom',  c1:'#e18ea3',c2:'#cf2f1e',mode:'random-gradient', ps:'36',dn:'90',jt:'22',sw:'0',sc:'#000000',sg:false,en:true},
    {id:'b',theme:'sunset', c1:'#e44d43',c2:'#f9cf80',mode:'gradient-cell',   ps:'28',dn:'95',jt:'14',sw:'0',sc:'#000000',sg:false,en:true},
  ]
};

// ══ Themes ════════════════════════════════════════════════════════════════════
const THEMES = {
  surface:{ name:'Surface', c1:'#645139', c2:'#5ca6cd' },
  sunset: { name:'Sunset',  c1:'#e44d43', c2:'#f9cf80' },
  forest: { name:'Forest',  c1:'#a0b80a', c2:'#4e5d02' },
  bloom:  { name:'Bloom',   c1:'#e18ea3', c2:'#cf2f1e' },
  custom: { name:'Custom',  c1:'#02e6ff', c2:'#0044cc' },
};

const LAYERS = [
  { id:'d', body:'bd', theme:'bloom',   mode:'solid-brightness', ps:22, den:100, jit:12, sw:3, sc:'#000000', sg:false },
  { id:'s', body:'bs', theme:'forest',  mode:'solid-brightness', ps:28, den:100, jit:15, sw:3, sc:'#000000', sg:false },
  { id:'m', body:'bm', theme:'bloom',   mode:'gradient-cell',    ps:34, den:100, jit:20, sw:3, sc:'#000000', sg:false },
  { id:'h', body:'bh', theme:'sunset',  mode:'random-gradient',  ps:42, den:100, jit:25, sw:3, sc:'#000000', sg:false },
  { id:'b', body:'bb', theme:'surface', mode:'gradient-cell',    ps:36, den:100, jit:20, sw:3, sc:'#000000', sg:false },
];

// ══ State ═════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('output-canvas');
const ctx = canvas.getContext('2d');
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
let src = null;        // img or video element
let inType = 'img';
let offC = null, offX = null;
let scat = {};         // { s:[], m:[], h:[] }
let liveRAF = null;
let txtLayers = [], selTxt = -1, customFont = null;
let cvScale = 1;

// ══ Build layer UI ════════════════════════════════════════════════════════════
function buildLayerUI(l) {
  const body = document.getElementById(l.body);
  const thOpts = Object.entries(THEMES).map(([k,v]) =>
    `<option value="${k}"${k===l.theme?' selected':''}>${v.name}</option>`).join('');
  const modeBtn = (id, label, mode) =>
    `<div class="chip${l.mode===mode?' on':''}" data-mode="${mode}" data-lid="${id}" onclick="setMode('${id}','${mode}')">${label}</div>`;

  body.innerHTML = `
    <div class="field"><label class="lbl">Color theme</label>
      <select id="${l.id}th" onchange="onTheme('${l.id}')">
        ${thOpts}
      </select>
      <div class="swatch" id="${l.id}swc"></div>
    </div>
    <div id="${l.id}cc" style="display:none" class="field">
      <label class="lbl">From → To</label>
      <div class="row">
        <input type="color" id="${l.id}c1" value="${THEMES.custom.c1}" oninput="onTheme('${l.id}')">
        <div style="flex:1;height:14px;border-radius:3px" id="${l.id}gm"></div>
        <input type="color" id="${l.id}c2" value="${THEMES.custom.c2}" oninput="onTheme('${l.id}')">
      </div>
    </div>
    <div class="field"><label class="lbl">Color mode</label>
      <div class="chips" id="${l.id}chips">
        ${modeBtn(l.id,'Solid','solid')}
        ${modeBtn(l.id,'Gradient','gradient-cell')}
        ${modeBtn(l.id,'Brightness','solid-brightness')}
        ${modeBtn(l.id,'Random ↔','random-gradient')}
      </div>
    </div>
    <div class="field"><label class="lbl">Pixel size</label>
      <div class="row"><input type="range" id="${l.id}ps" min="2" max="120" value="${l.ps}" oninput="sn(this,'${l.id}nps');isc('${l.id}');render()">
      <input type="number" id="${l.id}nps" min="2" max="120" value="${l.ps}" oninput="sr(this,'${l.id}ps');isc('${l.id}');render()"></div>
    </div>
    <div class="field"><label class="lbl">Density <span style="color:#bbb;font-weight:400">(% of grid filled)</span></label>
      <div class="row"><input type="range" id="${l.id}dn" min="5" max="100" value="${l.den}" oninput="sn(this,'${l.id}ndn');isc('${l.id}');render()">
      <input type="number" id="${l.id}ndn" min="5" max="100" value="${l.den}" oninput="sr(this,'${l.id}dn');isc('${l.id}');render()"></div>
    </div>
    <div class="field"><label class="lbl">Jitter <span style="color:#bbb;font-weight:400">(0 = perfect grid)</span></label>
      <div class="row"><input type="range" id="${l.id}jt" min="0" max="100" value="${l.jit}" oninput="sn(this,'${l.id}njt');isc('${l.id}');render()">
      <input type="number" id="${l.id}njt" min="0" max="100" value="${l.jit}" oninput="sr(this,'${l.id}jt');isc('${l.id}');render()"></div>
    </div>
    <hr class="div">
    <div class="field"><label class="lbl">Stroke color + weight</label>
      <div class="row"><input type="color" id="${l.id}sc" value="${l.sc}" oninput="render()">
      <input type="range" id="${l.id}sw" min="0" max="20" value="${l.sw}" oninput="sn(this,'${l.id}nsw');render()">
      <input type="number" id="${l.id}nsw" min="0" max="20" value="${l.sw}" oninput="sr(this,'${l.id}sw');render()" style="width:38px"></div>
    </div>
    <div class="tog-row">
      <span style="font-size:11px">Stroke groups <span style="color:#bbb;font-size:10px">(outline overlapping cells)</span></span>
      <label class="tog"><input type="checkbox" id="${l.id}sg"${l.sg?' checked':''} onchange="render()"><span class="ts"></span></label>
    </div>
  `;
  updSwatch(l.id);
}

function onTheme(id) {
  const t = gv(id+'th');
  document.getElementById(id+'cc').style.display = t==='custom'?'block':'none';
  updSwatch(id);
  render();
}

function updSwatch(id) {
  const [c1,c2] = getColors(id);
  document.getElementById(id+'swc').style.background = `linear-gradient(135deg,${c1},${c2})`;
  const gm = document.getElementById(id+'gm');
  if (gm) gm.style.background = `linear-gradient(90deg,${c1},${c2})`;
}

function onLayerToggle(cb, id) {
  const sh = cb.closest('.sh');
  if (sh) sh.classList.toggle('off', !cb.checked);
  render();
}

function setMode(id, mode) {
  document.querySelectorAll(`#${id}chips .chip`).forEach(c=>c.classList.remove('on'));
  const chip = document.querySelector(`#${id}chips .chip[data-mode="${mode}"]`);
  if (chip) chip.classList.add('on');
  render();
}

function getMode(id) {
  const a = document.querySelector(`#${id}chips .chip.on`);
  return a?.dataset.mode || 'solid';
}

function getColors(id) {
  const t = gv(id+'th');
  if (t==='custom') return [gv(id+'c1')||'#ffffff', gv(id+'c2')||'#000000'];
  return [THEMES[t].c1, THEMES[t].c2];
}

// ══ Scatter (grid with jitter) ════════════════════════════════════════════════
function isc(id) { scat[id] = null; }
function iscAll() { LAYERS.forEach(l=>scat[l.id]=null); }

function ensureScat(id, W, H) {
  if (scat[id]) return;
  const ps  = +gv(id+'ps') || 30;
  const den = +gv(id+'dn') || 100;
  const jit = +gv(id+'jt') || 0;
  const step = ps;
  const maxJ = step * (jit/100) * 0.5; // half-cell max displacement
  const pts = [];
  // Regular grid starting from half-step so cells are centered in cells
  for (let cy = step*0.5; cy < H + step; cy += step) {
    for (let cx = step*0.5; cx < W + step; cx += step) {
      if (Math.random()*100 > den) continue;
      pts.push({
        rx: cx + (Math.random()-.5)*2*maxJ,
        ry: cy + (Math.random()-.5)*2*maxJ,
        ga: Math.random()*Math.PI*2,
      });
    }
  }
  scat[id] = pts;
}

function regenerate() { iscAll(); render(); }

// ══ Colour helpers ════════════════════════════════════════════════════════════
function hexRgb(h) { return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function lerpHex(c1,c2,t) {
  const [r1,g1,b1]=hexRgb(c1),[r2,g2,b2]=hexRgb(c2);
  return `rgb(${~~(r1+(r2-r1)*t)},${~~(g1+(g2-g1)*t)},${~~(b1+(b2-b1)*t)})`;
}
function hexA(h,a) { const [r,g,b]=hexRgb(h); return `rgba(${r},${g},${b},${a/100})`; }

// ══ Draw one cell ══════════════════════════════════════════════════════════════
function drawCell(rx, ry, ps, mode, c1, c2, bri, ga) {
  const half=ps/2, x=rx-half, y=ry-half;
  if (mode==='solid') {
    ctx.fillStyle = c1;
  } else if (mode==='gradient-cell') {
    const g=ctx.createLinearGradient(x,y,x+ps,y+ps);
    g.addColorStop(0,c1); g.addColorStop(1,c2);
    ctx.fillStyle=g;
  } else if (mode==='solid-brightness') {
    ctx.fillStyle = lerpHex(c1,c2,bri/255);
  } else { // random-gradient
    const cos=Math.cos(ga)*ps, sin=Math.sin(ga)*ps;
    const g=ctx.createLinearGradient(rx-cos/2,ry-sin/2,rx+cos/2,ry+sin/2);
    g.addColorStop(0,c1); g.addColorStop(1,c2);
    ctx.fillStyle=g;
  }
  ctx.fillRect(x,y,ps,ps);
}

// ══ Render one layer (handles both stroke modes) ════════════════════════════
function renderLayer(l, W, H, pixels) {
  if (!document.getElementById(l.id+'en')?.checked) return;
  const tDk=+gv('td'), tSh=+gv('ts'), tMi=+gv('tm'), tHi=+gv('th');
  const bounds = { d:[0,tDk], s:[tDk,tSh], m:[tSh,tMi], h:[tMi,tHi], b:[tHi,256] };
  const [minB,maxB] = bounds[l.id];

  ensureScat(l.id, W, H);
  const pts = scat[l.id];
  const ps   = +gv(l.id+'ps') || 30;
  const sw   = +gv(l.id+'sw');
  const sc   = gv(l.id+'sc');
  const mode = getMode(l.id);
  const [c1,c2] = getColors(l.id);
  const useGroupStroke = sw>0 && document.getElementById(l.id+'sg')?.checked;

  // Filter pts matching threshold
  const active = pts.filter(({rx,ry}) => {
    const sx=clamp(Math.round(rx),0,W-1), sy=clamp(Math.round(ry),0,H-1);
    const i=(sy*W+sx)*4;
    const br=0.299*pixels[i]+0.587*pixels[i+1]+0.114*pixels[i+2];
    return br>=minB && br<maxB;
  });
  if (!active.length) return;

  // ── Draw fills ──────────────────────────────────────────────────────────────
  active.forEach(({rx,ry,ga}) => {
    const sx=clamp(Math.round(rx),0,W-1), sy=clamp(Math.round(ry),0,H-1);
    const i=(sy*W+sx)*4;
    const bri=0.299*pixels[i]+0.587*pixels[i+1]+0.114*pixels[i+2];
    drawCell(rx,ry,ps,mode,c1,c2,bri,ga);
  });

  if (sw===0) return;

  if (!useGroupStroke) {
    // ── Per-cell stroke ─────────────────────────────────────────────────────
    ctx.strokeStyle = sc;
    ctx.lineWidth = sw;
    active.forEach(({rx,ry}) => ctx.strokeRect(rx-ps/2,ry-ps/2,ps,ps));
    return;
  }

  // ── Group stroke: rasterise mask → edge detect → draw outline ─────────────
  const maskC = document.createElement('canvas');
  maskC.width=W; maskC.height=H;
  const mX=maskC.getContext('2d');
  mX.fillStyle='#fff';
  active.forEach(({rx,ry})=>mX.fillRect(rx-ps/2,ry-ps/2,ps,ps));
  const mask = mX.getImageData(0,0,W,H).data;

  const strkC = document.createElement('canvas');
  strkC.width=W; strkC.height=H;
  const sX=strkC.getContext('2d');
  const sImg=sX.createImageData(W,H);
  const [sr,sg2,sb2]=hexRgb(sc);
  const r=Math.max(1,Math.ceil(sw/2));

  for (let y=0;y<H;y++) {
    for (let x=0;x<W;x++) {
      const i=(y*W+x)*4;
      if (mask[i+3]===0) continue; // not filled
      let edge=false;
      outer: for (let dy=-r;dy<=r;dy++) {
        for (let dx=-r;dx<=r;dx++) {
          const nx=x+dx, ny=y+dy;
          if (nx<0||nx>=W||ny<0||ny>=H||mask[(ny*W+nx)*4+3]===0) { edge=true; break outer; }
        }
      }
      if (edge) { sImg.data[i]=sr; sImg.data[i+1]=sg2; sImg.data[i+2]=sb2; sImg.data[i+3]=255; }
    }
  }
  sX.putImageData(sImg,0,0);
  ctx.drawImage(strkC,0,0);
}

// ══ Main render ═══════════════════════════════════════════════════════════════
function render() {
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle = gv('bgc')||'#000';
  ctx.fillRect(0,0,W,H);

  if (!src) {
    ctx.fillStyle='#555'; ctx.font='bold 15px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Upload an image or video to get started',W/2,H/2);
    ctx.textAlign='left'; return;
  }

  // Sync offscreen canvas (gets current video frame if src is video)
  if (!offC||offC.width!==W||offC.height!==H) {
    offC=document.createElement('canvas'); offC.width=W; offC.height=H;
    offX=offC.getContext('2d'); iscAll();
  }
  offX.drawImage(src,0,0,W,H);
  const pixels = offX.getImageData(0,0,W,H).data;

  LAYERS.forEach(l => renderLayer(l, W, H, pixels));

  // Reference overlay
  const ra=+gv('ref');
  if (ra>0) { ctx.globalAlpha=ra/100; ctx.drawImage(src,0,0,W,H); ctx.globalAlpha=1; }
}

// ══ Input ═════════════════════════════════════════════════════════════════════
function switchInput(t) {
  inType=t;
  document.getElementById('ti').classList.toggle('on',t==='img');
  document.getElementById('tv').classList.toggle('on',t==='vid');
  document.getElementById('ii').style.display=t==='img'?'block':'none';
  document.getElementById('iv').style.display=t==='vid'?'block':'none';
}

function loadImg(e) {
  const f=e.target.files[0]; if(!f) return;
  stopLive();
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{ src=img; const t=document.getElementById('ith'); t.src=url; t.style.display='block'; offC=null; render(); };
  img.src=url;
}

function loadVid(e) {
  const f=e.target.files[0]; if(!f) return;
  stopLive();
  const url=URL.createObjectURL(f);
  const v=document.getElementById('vp');
  v.src=url; v.style.display='block';
  v.addEventListener('loadeddata',()=>{ src=v; offC=null; render(); },{once:true});
  v.addEventListener('seeked',()=>{ render(); }); // re-render on manual scrub
}

function processFrame() { if(src?.tagName==='VIDEO') render(); }

async function loadExampleImg() {
  try {
    const resp = await fetch('./media/flower.jpg');
    if (!resp.ok) throw new Error('not found');
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      stopLive(); src = img; offC = null;
      const t = document.getElementById('ith'); t.src = url; t.style.display = 'block';
      applyState(DEFAULT_PRESET); render();
    };
    img.src = url;
    switchInput('img');
  } catch(e) { alert('Example media not available — try uploading your own image.'); }
}

async function loadExampleVid() {
  try {
    stopLive();
    switchInput('vid');
    const v = document.getElementById('vp');
    v.src = './media/loop.mp4';
    v.style.display = 'block';
    v.addEventListener('loadeddata', () => { src = v; offC = null; applyState(DEFAULT_PRESET); render(); }, {once:true});
  } catch(e) { alert('Example media not available — try uploading your own video.'); }
}

function onLiveToggle() { document.getElementById('live').checked ? startLive() : stopLive(); }

function startLive() {
  if (liveRAF) return;
  const loop=()=>{
    // Only re-render when video is actively playing — scatter stays cached, only pixel colours update
    if (src?.tagName==='VIDEO' && !src.paused && !src.ended) render();
    liveRAF=requestAnimationFrame(loop);
  };
  liveRAF=requestAnimationFrame(loop);
}

function stopLive() {
  if(liveRAF){cancelAnimationFrame(liveRAF);liveRAF=null;}
  document.getElementById('live').checked=false;
}

// Drop onto canvas
document.getElementById('canvas-area').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('canvas-area').addEventListener('drop',e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0]; if(!f) return;
  if (f.type.startsWith('image/')) { switchInput('img'); loadImg({target:{files:[f]}}); }
  else if (f.type.startsWith('video/')) { switchInput('vid'); loadVid({target:{files:[f]}}); }
});

// ══ Canvas sizing ══════════════════════════════════════════════════════════════
function resize(w,h) {
  canvas.width=w; canvas.height=h; offC=null; iscAll(); fitCanvas(); render();
}
function fitCanvas() {
  const area=document.getElementById('canvas-area');
  const mw=area.clientWidth-24, mh=area.clientHeight-56;
  cvScale=Math.min(1,mw/canvas.width,mh/canvas.height);
  canvas.style.width=(canvas.width*cvScale)+'px';
  canvas.style.height=(canvas.height*cvScale)+'px';
  renderText();
}
window.addEventListener('resize',fitCanvas);
document.getElementById('cw').addEventListener('change',()=>resize(+gv('cw'),+gv('ch')));
document.getElementById('ch').addEventListener('change',()=>resize(+gv('cw'),+gv('ch')));
document.getElementById('preset-size').addEventListener('change',e=>{
  const [w,h]=(e.target.value||'').split('x').map(Number);
  if(w&&h){document.getElementById('cw').value=w;document.getElementById('ch').value=h;resize(w,h);}
});

// ══ Presets ════════════════════════════════════════════════════════════════════
const PKEY='ngp-presets-v1';

function getPresets() { try{return JSON.parse(localStorage.getItem(PKEY))||[];}catch{return [];} }
function savePresets(p) { localStorage.setItem(PKEY,JSON.stringify(p)); }

function getState() {
  return {
    td:gv('td'),ts:gv('ts'),tm:gv('tm'),th:gv('th'),ref:gv('ref'),bgc:gv('bgc'),
    layers: LAYERS.map(l=>({
      id:l.id, theme:gv(l.id+'th'), c1:gv(l.id+'c1'), c2:gv(l.id+'c2'),
      mode:getMode(l.id),
      ps:gv(l.id+'ps'), dn:gv(l.id+'dn'), jt:gv(l.id+'jt'),
      sw:gv(l.id+'sw'), sc:gv(l.id+'sc'),
      sg:!!document.getElementById(l.id+'sg')?.checked,
      en:!!document.getElementById(l.id+'en')?.checked,
    }))
  };
}

function applyState(st) {
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  set('td',st.td); set('ntd',st.td);
  set('ts',st.ts); set('nts',st.ts); set('tm',st.tm); set('ntm',st.tm);
  set('th',st.th); set('nth',st.th); set('ref',st.ref); set('nref',st.ref);
  set('bgc',st.bgc);
  (st.layers||[]).forEach(ls=>{
    const id=ls.id;
    set(id+'th',ls.theme); onTheme(id);
    if(ls.theme==='custom'){set(id+'c1',ls.c1);set(id+'c2',ls.c2);updSwatch(id);}
    setMode(id,ls.mode);
    set(id+'ps',ls.ps);set(id+'nps',ls.ps);
    set(id+'dn',ls.dn);set(id+'ndn',ls.dn);
    set(id+'jt',ls.jt);set(id+'njt',ls.jt);
    set(id+'sw',ls.sw);set(id+'nsw',ls.sw);
    set(id+'sc',ls.sc);
    const sg=document.getElementById(id+'sg');if(sg)sg.checked=!!ls.sg;
    const en=document.getElementById(id+'en');
    if(en){en.checked=ls.en!==false;en.closest('.sh')?.classList.toggle('off',!en.checked);}
  });
  iscAll(); render();
}

function showSaveForm() {
  const frm=document.getElementById('save-form');
  frm.style.display='block';
  const nm=document.getElementById('preset-name');
  nm.value='Preset '+(getPresets().length+1);
  nm.focus(); nm.select();
}
function hideSaveForm() { document.getElementById('save-form').style.display='none'; }
function confirmSave() {
  const name=document.getElementById('preset-name').value.trim();
  if(!name) return;
  const p=getPresets();
  p.push({name,state:getState(),saved:new Date().toLocaleDateString()});
  savePresets(p); refreshPresetList(); hideSaveForm();
  const info=document.getElementById('preset-info');
  info.textContent='✓ Saved "'+name+'"';
  setTimeout(()=>info.textContent='',2500);
}
// Allow Enter key in name input
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('preset-name').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmSave(); if(e.key==='Escape') hideSaveForm(); });
});

function loadPreset() {
  const sel=document.getElementById('preset-sel');
  const idx=+sel.value; if(isNaN(idx)||sel.value==='') return;
  const p=getPresets();
  if(p[idx]) applyState(p[idx].state);
}

function deletePreset() {
  const sel=document.getElementById('preset-sel');
  const idx=+sel.value; if(isNaN(idx)||sel.value==='') return;
  const p=getPresets(); if(!p[idx]) return;
  const info=document.getElementById('preset-info');
  info.innerHTML=`Delete "<b>${p[idx].name}</b>"? <button class="btn sm del" onclick="confirmDelete(${idx})" style="margin-left:4px">Yes, delete</button>`;
}
function confirmDelete(idx) {
  const p=getPresets(); p.splice(idx,1); savePresets(p); refreshPresetList();
  document.getElementById('preset-info').textContent='';
}

function previewPreset() {} // could show info; currently just selection

function refreshPresetList() {
  const p=getPresets();
  const sel=document.getElementById('preset-sel');
  const cur=sel.value;
  sel.innerHTML='<option value="">— select preset —</option>'+
    p.map((x,i)=>`<option value="${i}">${x.name} <span style="color:#aaa">${x.saved||''}</span></option>`).join('');
  sel.value=cur;
}

// ══ Text overlay ══════════════════════════════════════════════════════════════
function addTxt() {
  txtLayers.push({text:'Text',x:10,y:20,size:80,weight:'700',style:'normal',color:'#ffffff',bgColor:'#000',bgOp:0,font:null});
  selTxt=txtLayers.length-1; renderText(); updTxtCtrl();
}
function delTxt() {
  if(selTxt<0) return; txtLayers.splice(selTxt,1);
  selTxt=Math.min(selTxt,txtLayers.length-1); if(!txtLayers.length)selTxt=-1;
  renderText(); updTxtCtrl();
}
function renderText() {
  document.querySelectorAll('.text-ov').forEach(e=>e.remove());
  const show=document.getElementById('sht').checked;
  const list=document.getElementById('txtlist');
  list.innerHTML=txtLayers.map((l,i)=>`<div class="ti${i===selTxt?' on':''}" onclick="selT(${i})">${l.text||'(empty)'}</div>`).join('');
  if(!show) return;
  txtLayers.forEach((l,i)=>{
    const el=document.createElement('div');
    el.className='text-ov'+(i===selTxt?' sel':'');
    el.style.left=(l.x/100*canvas.width*cvScale)+'px';
    el.style.top=(l.y/100*canvas.height*cvScale)+'px';
    el.style.fontSize=(l.size*cvScale)+'px';
    el.style.fontWeight=l.weight; el.style.fontStyle=l.style; el.style.color=l.color;
    el.style.fontFamily=l.font||'inherit';
    if(l.bgOp>0){el.style.background=hexA(l.bgColor,l.bgOp);el.style.padding='2px 6px';}
    el.textContent=l.text;
    el.addEventListener('click',e=>{e.stopPropagation();selT(i);});
    el.addEventListener('mousedown',e=>dragTxt(e,i));
    document.getElementById('canvas-wrapper').appendChild(el);
  });
}
function selT(i){selTxt=i;renderText();updTxtCtrl();}
function updTxtCtrl() {
  const c=document.getElementById('txtctrl');
  if(selTxt<0||selTxt>=txtLayers.length){c.style.display='none';return;}
  c.style.display='block';
  const l=txtLayers[selTxt];
  document.getElementById('tc').value=l.text;
  document.getElementById('tfs').value=l.size; document.getElementById('ntfs').value=l.size;
  document.getElementById('tw').value=l.weight; document.getElementById('tst').value=l.style;
  document.getElementById('tco').value=l.color; document.getElementById('tbg').value=l.bgColor;
  document.getElementById('tbgo').value=l.bgOp;
}
function updTxt() {
  if(selTxt<0) return; const l=txtLayers[selTxt];
  l.text=gv('tc'); l.size=+gv('tfs'); l.weight=gv('tw'); l.style=gv('tst');
  l.color=gv('tco'); l.bgColor=gv('tbg'); l.bgOp=+gv('tbgo');
  renderText();
  const items=document.querySelectorAll('#txtlist .ti');
  if(items[selTxt]) items[selTxt].textContent=l.text||'(empty)';
}
function dragTxt(e,i) {
  e.preventDefault(); selT(i);
  const sx=e.clientX,sy=e.clientY,ox=txtLayers[i].x,oy=txtLayers[i].y;
  const mv=e=>{
    txtLayers[i].x=ox+(e.clientX-sx)/(canvas.width*cvScale)*100;
    txtLayers[i].y=oy+(e.clientY-sy)/(canvas.height*cvScale)*100;
    renderText();
  };
  const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}
function loadFont(e) {
  const f=e.target.files[0]; if(!f) return;
  const url=URL.createObjectURL(f), name='cf'+Date.now();
  new FontFace(name,`url(${url})`).load().then(ff=>{
    document.fonts.add(ff); customFont=name;
    if(selTxt>=0){txtLayers[selTxt].font=name;updTxt();}
  });
}

// ══ Export ════════════════════════════════════════════════════════════════════
function exportPNG() {
  const ec=document.createElement('canvas'); ec.width=canvas.width; ec.height=canvas.height;
  const ex=ec.getContext('2d'); ex.drawImage(canvas,0,0);
  if(document.getElementById('sht').checked) {
    txtLayers.forEach(l=>{
      ex.font=`${l.style} ${l.weight} ${l.size}px ${l.font||'sans-serif'}`;
      const px=l.x/100*canvas.width, py=l.y/100*canvas.height;
      if(l.bgOp>0){const m=ex.measureText(l.text);ex.fillStyle=hexA(l.bgColor,l.bgOp);ex.fillRect(px-6,py-l.size,m.width+12,l.size+8);}
      ex.fillStyle=l.color; ex.fillText(l.text,px,py);
    });
  }
  const a=document.createElement('a'); a.download='pixelation.png'; a.href=ec.toDataURL('image/png'); a.click();
}

// ══ Reset ═════════════════════════════════════════════════════════════════════
function resetAll() {
  [['td','ntd',25],['ts','nts',50],['tm','ntm',130],['th','nth',200],['ref','nref',0]].forEach(([r,n,v])=>{
    document.getElementById(r).value=v; document.getElementById(n).value=v;
  });
  iscAll(); render();
}

// ══ Utils ══════════════════════════════════════════════════════════════════════
function gv(id){const e=document.getElementById(id);return e?e.value:null;}
function sn(r,nId){document.getElementById(nId).value=r.value;}
function sr(n,rId){document.getElementById(rId).value=n.value;}
function tog(h){
  h.classList.toggle('op');
  h.nextElementSibling.classList.toggle('op');
  h.querySelector('.ar').textContent=h.classList.contains('op')?'▲':'▼';
}

// ══ Init ══════════════════════════════════════════════════════════════════════
LAYERS.forEach(l=>buildLayerUI(l));
refreshPresetList();
resize(800,1100);
</script>
